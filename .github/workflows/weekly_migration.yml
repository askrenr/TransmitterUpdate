name: Weekly migration update

on:
  schedule:
    # Mondays at 12:15 UTC (~6:15am Central during standard time)
    - cron: "15 12 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MOVEBANK_USER: ${{ secrets.MOVEBANK_USER }}
      MOVEBANK_PASS: ${{ secrets.MOVEBANK_PASS }}
      MOVEBANK_STUDY_ID: "2665435998"
      OUT_DIR_DATA: "docs/data"
      OUT_MD: "docs/weekly_status.md"
      THRESH_NET_KM_MIGRATING: "150"
      THRESH_LAT_CHANGE_DEG: "1.0"
      THRESH_NET_KM_TRANSITIONAL: "60"

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies (sf)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin libgeos-dev libproj-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("move","dplyr","lubridate","sf","rnaturalearth","jsonlite","readr","stringr"), repos="https://cloud.r-project.org")'

      - name: Run weekly pipeline
        run: |
          Rscript scripts/weekly_migration_pipeline.R

      - name: Commit + push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/weekly_status.md
          git commit -m "Weekly migration update" || echo "No changes to commit"
          git push
