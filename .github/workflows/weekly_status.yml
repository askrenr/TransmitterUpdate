name: Weekly migration update

on:
  schedule:
    # Runs daily at 12:15 UTC and 18:15 UTC
    - cron: "15 12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-migration-update
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      MOVEBANK_USER: ${{ secrets.MOVEBANK_USER }}
      MOVEBANK_PASS: ${{ secrets.MOVEBANK_PASS }}
      MOVEBANK_STUDY_ID: "2665435998"
      OUT_DIR_DATA: "docs/data"
      OUT_MD: "docs/weekly_status.md"
      THRESH_NET_KM_MIGRATING: "150"
      THRESH_LAT_CHANGE_DEG: "1.0"
      THRESH_NET_KM_TRANSITIONAL: "60"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.2"
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            make \
            g++

      - name: Restore renv library
        uses: r-lib/actions/setup-renv@v2
        with:
          cache: true

      - name: Show session info
        run: |
          Rscript -e 'sessionInfo()'
          Rscript -e 'renv::status()'

      - name: Run weekly pipeline
        run: Rscript scripts/weekly_migration_pipeline.R

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/weekly_status.md docs/data
          git diff --cached --quiet || git commit -m "Weekly migration update"
          git push
